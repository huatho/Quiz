services:
  db:
    image: postgres:16
    container_name: project_postgres
    environment:
      POSTGRES_DB: project_03302026
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: huatho131
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: project_backend
    ports:
      - "8383:8383"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/project_03302026
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: huatho131
      SERVER_PORT: 8383

volumes:
  postgres_data: